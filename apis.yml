aid: chief-human-capital-officers
name: Chief Human Capital Officers Council
kind: government
description: >-
  The Chief Human Capital Officers (CHCO) Council is the principal interagency
  forum to advise and coordinate the activities of members on matters of
  modernization of human resources (HR) systems, improved quality of human
  resources information, and legislation affecting human resources operations
  and organizations across the U.S. federal government. Established under the
  Chief Human Capital Officers Act of 2002 (5 U.S.C. 1401-1402), the Council
  is chaired by the Director of the U.S. Office of Personnel Management (OPM)
  with the Deputy Director for Management at OMB serving as Vice Chair. The
  CHCO Council coordinates federal human capital management strategy, supports
  the Federal HR workforce, advances workforce planning and talent acquisition,
  and oversees performance management, employee engagement, learning and
  development, and HR policy implementation across departments and agencies.
