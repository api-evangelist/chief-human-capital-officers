    name: Chief Human Capital Officers Council Resources
    description: >-
      The CHCO Council publishes its charter, leadership roster, working
      group output, policy memoranda, and federal human capital guidance
      through chcoc.gov (now hosted under opm.gov). The Council does not
      expose a dedicated developer API; resources are distributed as web
      pages and downloadable documents alongside OPM's broader human
      capital management resources.
